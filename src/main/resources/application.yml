spring:
  application:
    name: cicd-demo

server:
  port: 8088

# Actuator: mo cac endpoint health/info/prometheus cho K8s probes + monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true   # bat liveness/readiness cho Kubernetes
  metrics:
    tags:
      application: cicd-demo
