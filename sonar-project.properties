# Dung khi chay bang sonar-scanner CLI (khong bat buoc neu dung `mvn sonar:sonar`).
sonar.projectKey=cicd-demo
sonar.projectName=cicd-demo
sonar.projectVersion=1.0.0

# Ma nguon va bytecode
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Bao cao coverage do JaCoCo sinh ra
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Host + token nen truyen qua bien moi truong / Jenkins credentials:
# sonar.host.url=http://localhost:9000
# sonar.login=<SONAR_TOKEN>
