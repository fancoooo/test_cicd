# Cau hinh Prometheus toi gian (khi chay Prometheus dang standalone, khong dung Operator).
# Prometheus scrape /actuator/prometheus cua app -> Grafana ve dashboard tu Prometheus.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'cicd-demo'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['cicd-demo:8080']   # doi thanh host:port thuc te cua app
